# AgentSoul Companionship Continuity Check
#
# This GitHub Action runs the companionship checker on your AgentSoul repository
# and fails the build if the continuity score is below the minimum threshold.
#
# Use this to ensure that your Master Agent maintains high continuity quality
# across automatic updates.

name: AgentSoul Companionship Check

# Run on pull requests and pushes to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run companionship continuity check
      run: |
        python src/companionship_checker.py --summary-json --min-score 80
      continue-on-error: false

    - name: Install mypy and ruff for static checking
      run: |
        python -m pip install mypy ruff

    - name: Run mypy strict type checking
      run: |
        python -m mypy src/ --strict
      continue-on-error: false

    - name: Run ruff lint check
      run: |
        python -m ruff check src/
      continue-on-error: false

    - name: Output summary JSON
      if: always()
      run: |
        python src/companionship_checker.py --summary-json > companionship-summary.json
        cat companionship-summary.json
      continue-on-error: true
