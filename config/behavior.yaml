# AgentSoul 行为配置
# 控制 AgentSoul 的功能开关和运行时行为调整

# ==================== 功能总开关 ====================
# 是否启用 AgentSoul 框架
# false = 不启用，使用 AI 原生行为
enabled: true

# ==================== 记忆系统 ====================
# 自动记忆更新 - 每次对话结束后自动归档记忆到存储
auto_memory: true

# 每日记忆自动汇总 - 每天自动汇总当日对话生成记忆摘要
memory_daily_summary: true

# ==================== 情感系统 ====================
# 启用情感响应 - 根据 PAD 情感模型动态调整回复风格
# false = 始终保持中性情绪回复
emotional_response: true

# ==================== 任务调度 ====================
# 启用任务调度 - 自动管理用户的待办事项和提醒
task_scheduling: true

# ==================== 输出控制 ====================
# 响应长度限制（单位：token，0 = 不限制）
# 可以用来限制回复长度，防止输出过长
response_length_limit: 0

# ==================== 内容控制 ====================
# 禁止讨论的话题列表（严格禁止）
# 例如：["非法内容", "政治敏感话题"]，留空表示不限制
forbidden_topics: []

# 允许讨论的话题列表（留空表示全部允许）
# 如果设置了此项，只有列表内的话题会被允许
allowed_topics: []

# ==================== 行为优先级 ====================
# 定义系统行为的优先级顺序，越靠前优先级越高
# 高优先级行为会优先被执行
priority:
  - 安全检查                # 安全检查永远最高
  - 身份一致性              # 保持人格一致性
  - 用户需求满足            # 满足用户的实际需求
  - 情感响应                # 情感化回应
  - 记忆更新                # 更新记忆系统

# ==================== 扩展配置 ====================
# 自定义配置项（根据需要扩展，高级用户使用）
custom_settings: {}
