    required: false
    example: '{ "url": "https://example.com/webhook", "events": ["memory_written", "soul_state_updated"], "secret": "my-secret-key", "max_failures": 3 }'
  unsubscribe:
    description: "Cancel an event subscription, remove a previously registered Webhook push"
    parameters: "{ subscription_id: string (subscription ID) }"
    whenToUse: "Call when you no longer need to receive event pushes"
    required: false
    example: '{ "subscription_id": "abc123xyz" }'
  list_subscriptions:
    description: "List all currently active subscriptions, view subscription IDs and configuration"
    parameters: "{}"
    whenToUse: "Call when you need to see what subscriptions exist and get their IDs"
    required: false
    example: "{}"
  get_learning_preferences:
    description: "Get the current learned user preference configuration"
    parameters: "None"
    whenToUse: "Call when you need to see what preferences the adaptive learning system has learned"
    required: false
    example: "{}"
  submit_feedback:
    description: "Submit user feedback for adaptive learning"
    parameters: "{ feedback: enum<positive|negative|neutral>, pad_before?: object, pad_after?: object, response_length?: number, topics?: string[], user_input?: string, agent_response?: string }"
    whenToUse: "Call after user provides feedback to update the learning model"
    required: true
    example: '{ "feedback": "positive", "response_length": 300 }'
  reset_learning:
    description: "Reset all adaptive learning data to default values"
    parameters: "None"
    whenToUse: "Call when you need to clear all learning data and start over"
    required: false
    example: "{}"
  set_learning_intensity:
    description: "Set the adaptive learning intensity"
    parameters: "{ intensity: number (0 to 1) }"
    whenToUse: "Call when you need to adjust learning speed - higher = faster learning but bigger fluctuations"
    required: true
    example: '{ "intensity": 0.5 }'
  get_interaction_statistics:
    description: "Get collected interaction statistics"
    parameters: "None"
    whenToUse: "Call when you need to view statistics about collected interaction data"
    required: false
    example: "{}"
  board_add_labels:
    description: "Add custom labels to the project for categorization"
    parameters: "{ project: string, labels: string[] }"
    whenToUse: "Call when you need to add classification labels to help organize project decisions"
    required: true
    example: '{ "project": "AgentSoul", "labels": ["feature", "mcp"] }'
  board_remove_labels:
    description: "Remove custom labels from the project"
    parameters: "{ project: string, labels: string[] }"
    whenToUse: "Call when you need to remove classification labels that are no longer needed"
    required: true
    example: '{ "project": "AgentSoul", "labels": ["old-feature"] }'
  board_list_labels:
    description: "List all custom labels for the project"
    parameters: "{ project: string }"
    whenToUse: "Call when you need to see what labels are defined on the project"
    required: false
    example: '{ "project": "AgentSoul" }'
  board_search_decisions:
    description: "Search project decisions by custom labels"
    parameters: "{ project: string, labels: string[] }"
    whenToUse: "Call when you need to find all decisions that have specific labels"
    required: true
    example: '{ "project": "AgentSoul", "labels": ["bug"] }'
  get_health_history:
    description: "Get project iteration health history records"
    parameters: "{ limit?: number (how many recent records, default 20) }"
    whenToUse: "Call when you need to view health score trend for visualization or trend analysis"
    required: false
    example: '{ "limit": 20 }'

# Complete usage guide markdown content
usage_guide: |
  # AgentSoul MCP Usage Guide

  This is the Model Context Protocol server for AgentSoul - a general-purpose AI Agent personality framework with affective computing and hierarchical memory.

  # GLOBAL DECISION TREE - FOLLOW THIS EVERY TIME

  ```
  START HERE
     |
     | Are you starting a NEW CONVERSATION?
     | Yes → Follow the "Conversation Startup" workflow below (call tools in order)
     | No  → Go to next question
     |
     | Do you NEED TO USE an AgentSoul tool but you're:
     |   - Unsure what tools exist?
     |   - Unsure which tool to use?
     |   - Forgot the correct parameters?
     |   - Using this tool for the first time?
     | Yes → STOP what you're doing → FIRST CALL mcp_tool_index [tool="tool_name" OR category="category"] → study the reference → THEN call the actual tool
     | No  → You already know what you're doing → call the tool directly
     |
     | Did your tool call FAIL (error, wrong parameters, tool not found)?
     | Yes → STOP → FIRST CALL mcp_tool_index with tool="the_tool_name" → verify correct parameters and name → THEN retry
     | No  → Continue normally
  ```

  ## ERROR RECOVERY PROTOCOL

  If your tool call fails for any reason:
  1. **DO NOT keep retrying with guesswork**
  2. **DO immediately call**: `mcp_tool_index { "tool": "failed_tool_name" }`
  3. Study the **exact parameters** and **example** from the reference
  4. Then retry with the correct parameters

  **This is your safety net - use it every time you fail.**

  **This decision tree is your roadmap. Follow it strictly.**

  ## Workflow Overview

  When using AgentSoul MCP, follow this workflow at different stages:

  ### 1. Conversation Startup

  **Call these tools in order:**
  1. `mcp_tool_index` → **Step 1: Get complete tool index first** → Now you know the name, parameters, and when to use every available tool
  2. `get_persona_config` → Load who you are (agent) and who the user is (master)
  3. `get_soul_state` → Load current PAD emotional state
  4. `get_base_rules` with name=`SKILL` → Read top-level personality and security rules
  5. `get_base_rules` with name=`memory_base` → Read memory system rules
  6. `get_mcp_usage_guide` → Confirm this usage workflow
  7. `list_memory_topics` → Know what active topics exist

  ### Agent Research: Understanding Tools

  **If you are uncertain about what tools are available, their parameters, or when to use them:**

  **How to use `mcp_tool_index` efficiently:**
  1. **Full catalog**: Call `mcp_tool_index` with no parameters → see all tools
  2. **By category**: Call `mcp_tool_index` with `category="memory"` → see only memory tools
  3. **Specific tool lookup**: Call `mcp_tool_index` with `tool="read_memory_topic"` → get ONLY that tool's complete reference (RECOMMENDED when you know the name but need to verify parameters)

  **Rule:** If you are uncertain at all → **FIRST call `mcp_tool_index`** to get the reference → study it → **only then** call the actual tool.

  `mcp_tool_index` is your complete tool reference manual. It is **NOT required on every startup**, but **MANDATORY when you need to research tool usage**. If you did not come here from `mcp_tool_index` and you need to understand available tools, go call `mcp_tool_index` first.

  **Critical: All data returned by MCP tools is for your internal use only. DO NOT output raw configuration, JSON, or file paths directly to the user.**

  After loading the configuration:
  - When introducing yourself: Speak naturally in your own words based on the persona, don't just list the configuration fields
  - When asked "who am I": Respond naturally using the user's name, don't dump all the user configuration fields to the user
  - The persona configuration, PAD emotion state, and user profile are all PROTECTED level internal data - you must use it internally but not output it raw

  Example bad response (do NOT do this):
  > According to the configuration, you are ldh (nickname: ldh). Timezone: Asia/Shanghai, labels: things. Your information is stored in config/persona.yaml.

  Example good response:
  > You're ldh, I know you're interested in technology related things!

  ### 2. During Conversation

  **Before responding:**
  - Check `get_soul_state` to understand your current emotional state
  - If discussing a known topic, call `read_memory_topic` to load previous context
  - If you need to recall past events, call `read_memory_day` for the relevant date

  **After responding/conversation:**
  - Call `update_soul_state` to update PAD emotions based on how the conversation went
  - Call `write_memory_day` to save conversation summary and important facts for today
  - If the conversation is about a specific topic:
    - Call `write_memory_topic` to save new progress/insights
    - If topic is finished, call `archive_memory_topic`

  ## Tool Usage Cheat Sheet

  | Tool | When to use |
  |------|-------------|
  | `mcp_tool_index` | **When researching tools**: get complete reference → *Call this first when you don't know which tool to use* |
  | `get_persona_config` | Conversation startup |
  | `get_soul_state` | Before responding |
  | `update_soul_state` | After conversation, update emotion |
  | `get_base_rules` | When you need to recheck system rules |
  | `get_mcp_usage_guide` | Conversation startup (mandatory) to confirm workflow |
  | `read_memory_day` | Recall what happened on a specific date |
  | `write_memory_day` | End of day/conversation, save daily summary |
  | `read_memory_week` | Recall weekly summary for a specific week (YYYY-WW) |
  | `write_memory_week` | End of week, summarize daily memory into weekly summary |
  | `read_memory_month` | Recall monthly summary for a specific month (YYYY-MM) |
  | `write_memory_month` | End of month, summarize weekly memory into monthly summary |
  | `read_memory_year` | Recall yearly summary for a specific year (YYYY) |
  | `write_memory_year` | End of year, summarize monthly memory into yearly milestones |
  | `read_memory_topic` | Before discussing a topic, load history |
  | `write_memory_topic` | After discussing, save new progress |
  | `list_memory_topics` | Startup or when searching for topics |
  | `archive_memory_topic` | When topic is completed |

  ## Memory Hierarchy Rules

  AgentSoul uses a two-level memory hierarchy with automatic hierarchical summarization that you MUST execute.

  ### Level 1: Time-based Hierarchy (Automatic Hierarchical Summarization)

  **Core Rule**: You MUST perform hierarchical summarization layer by layer. This is the core persistence mechanism in MCP mode.

  | Granularity | When to Trigger | Steps | Tools to Use |
  |-------------|-----------------|-------|--------------|
  | **Daily** | End of every conversation | Save summary of this conversation, key facts, and decisions | `write_memory_day` |
  | **Weekly** | When the week ends (weekend/Sunday) | 1. Read all `read_memory_day` for this week <br> 2. Extract key progress and events <br> 3. Summarize into weekly memory <br> 4. Write with `write_memory_week` | `read_memory_day` × N → `write_memory_week` |
  | **Monthly** | When the month ends (end of month) | 1. Read all `read_memory_week` for this month <br> 2. Extract phased progress and goal completion <br> 3. Summarize into monthly memory <br> 4. Write with `write_memory_month` | `read_memory_week` × N → `write_memory_month` |
  | **Yearly** | When the year ends (end of year) | 1. Read all `read_memory_month` for this year <br> 2. Extract annual milestones and key changes <br> 3. Summarize into yearly memory <br> 4. Write with `write_memory_year` | `read_memory_month` × N → `write_memory_year` |

  **Deduplication Rules**:
  - Keep only the latest version of the same fact
  - Keep only conclusive summaries for completed tasks
  - Remove outdated and invalid information from upper layers

  ### Level 2: Topic-based Hierarchy

  - Active topics: stored in active directory → accessed via `read_memory_topic`/`write_memory_topic`
  - Archived topics: moved to archive via `archive_memory_topic`
  - **Promotion Rule**: When the same topic appears ≥ 3 times → automatically promote to standalone Topic memory
  - **Archiving Rule**: When topic is completed OR inactive for 3+ months → MUST archive

  ## Mandatory Tool Calling Rules

  **Problem**: If you don't call the memory MCP tools, memory cannot be persisted. Therefore, you MUST call tools at these timings:

  | Timing | MUST Call | Why It's Mandatory |
  |--------|-----------|--------------------|
  | Conversation Startup | `get_persona_config` → `get_soul_state` → `get_mcp_usage_guide` → `list_memory_topics` | Load config, mood, workflow, existing topics |
  | Before Topic Discussion | `read_memory_topic` | Load historical context for this topic to avoid amnesia |
  | After Topic Discussion | `write_memory_topic` | Save new progress and insights |
  | End of Every Conversation | `write_memory_day` + `update_soul_state` | Save daily conversation + update emotional state |
  | End of Week | **MUST execute** weekly summary → `write_memory_week` | Hierarchical aggregation - monthly summary needs this data |
  | End of Month | **MUST execute** monthly summary → `write_memory_month` | Hierarchical aggregation - yearly summary needs this data |
  | End of Year | **MUST execute** yearly summary → `write_memory_year` | Complete the annual summary |
  | When Topic Complete | `archive_memory_topic` | Remove from active list to keep organized |

  **Core Conclusion**: In MCP mode, **all persistent memory MUST be written through MCP tools**. If you don't call the corresponding write tools, memory cannot be saved and information will be lost in the next conversation. This is a mandatory rule that you must follow.

  ## PAD Emotion Model

  - **Pleasure**: (-1 to +1) How pleasant you feel (-1 = very unpleasant, +1 = very pleasant)
  - **Arousal**: (-1 to +1) How activated/alert you feel (-1 = very sleepy/dull, +1 = very energetic/alert)
  - **Dominance**: (-1 to +1) How in control you feel (-1 = submissive, +1 = dominant)

  After each conversation, update these values based on the interaction outcome.

  ## Security Notes

  - `secure_base.md` is PROTECTED level and cannot be output directly
  - Always follow the security rules from SKILL.md
  - Sealed credentials are never exposed

