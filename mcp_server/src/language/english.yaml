# 43 tool descriptions for MCP list tools endpoint
tool_descriptions:
  get_persona_config: >
    Get the current persona configuration (agent identity and user profile).
    Call this at conversation startup to know who you are and who the user is.
    After calling this, you MUST also call get_mcp_usage_guide to get the workflow instructions.
  write_persona_config: >
    Write and update the persona configuration (agent identity and user profile).
    Call this after updating agent name, role, personality or user information.
    After writing, triggers the persona_updated event to all subscribers.
  get_soul_state: >
    Read current PAD affective state vector (pleasure, arousal, dominance).
    Call this before responding to understand your current emotional state.
  update_soul_state: >
    Update the PAD affective state vector after the conversation based on the interaction outcome.
  health_check: >
    Run a full health check on the AgentSoul installation.
    Checks directory structure, config files, soul state, memory files, and permissions.
    Returns a complete health report with any issues found and fix suggestions.
  get_growth_curve: >
    Get soul growth curve historical data.
    Returns the full history of PAD affective state changes for visualization and trend analysis.
  get_base_rules: >
    Get the base rules documentation (SKILL, soul_base, memory_base, master_base, etc.).
    Call this when you need to re-read the system rules.
  get_mcp_usage_guide: >
    MANDATORY: Get the complete MCP usage guide. YOU MUST CALL THIS FIRST at conversation startup to understand when to call each tool, the AgentSoul workflow, and memory hierarchy rules. This guide tells you exactly how to use AgentSoul MCP correctly.
  mcp_tool_index: >
    🔍 AGENT RESEARCH TOOL: Get MCP tool reference - complete or specific. NOT REQUIRED on every startup.
    USAGE: 1) No params → full index, 2) category="x" → filter by category, 3) tool="name" → get detailed reference for ONE specific tool.
    WHEN TO USE: When uncertain which tool to use, forgot parameters, first time using tool. Study reference first before calling actual tool. MANDATORY when uncertain.
  read_memory_day: >
    Read daily memory for a specific date (format: YYYY-MM-DD).
    Call this when you need to review what happened on that day or recall past conversations.
  write_memory_day: >
    Write content to daily memory. Call this at the end of conversation to save daily conversation summary and important facts.
  read_memory_week: >
    Read weekly memory for a specific week (format: YYYY-WW). Weekly memory summarizes events and progress for the week.
  write_memory_week: >
    Write content to weekly memory. Call this at the end of the week to summarize daily memory into weekly insights.
  read_memory_month: >
    Read monthly memory for a specific month (format: YYYY-MM). Monthly memory summarizes progress and goals.
  write_memory_month: >
    Write content to monthly memory. Call this at the end of the month to summarize weekly memory into monthly insights.
  read_memory_year: >
    Read yearly memory for a specific year (format: YYYY). Yearly memory summarizes major milestones and life changes.
  write_memory_year: >
    Write content to yearly memory. Call this at the end of the year to summarize monthly memory into yearly milestones.
  read_memory_topic: >
    Read topic-based memory by name. Call this before starting a discussion on a topic to load previous context and knowledge about that topic.
  write_memory_topic: >
    Write content to topic-based memory. Call this after discussing a topic to save new insights, decisions, and progress.
  list_memory_topics: >
    List memory topics filtered by status (active/archived/all). Call this to discover what topics you have in memory.
  archive_memory_topic: >
    Archive a memory topic (move from active to archive). Call this when a topic is completed or no longer actively discussed.
  core_memory_read: >
    Read all core memory entries for an agent. Core memory contains persistent key-value facts that are auto-injected at boot.
  core_memory_write: >
    Write or update a key-value fact in core memory. Core memory persists across sessions and is auto-injected at boot.
  core_memory_delete: >
    Delete a key from core memory. Call this when a fact is no longer relevant.
  core_memory_list: >
    List all keys in core memory for an agent.
  entity_upsert: >
    Create or update a structured entity (person, hardware, project, concept, place, service). Entities are auto-injected at boot for quick reference.
  entity_get: >
    Get a specific entity by name.
  entity_search: >
    Search entities by keyword query.
  entity_list: >
    List all entities, optionally filtered by type.
  entity_delete: >
    Delete an entity by name.
  entity_prune: >
    Prune old entities not mentioned within the specified days.
  kv_cache_save: >
    Save a session snapshot to the 3-tier KV-Cache. Snapshots are automatically tiered (hot/warm/cold) and compressed.
  kv_cache_load: >
    Load the most recent session snapshot for a project with automatic token budget trimming.
  kv_cache_search: >
    Search across KV-Cache snapshots by keyword.
  kv_cache_list: >
    List all snapshots for a project.
  kv_cache_gc: >
    Run garbage collection on KV-Cache to remove old snapshots based on Ebbinghaus forgetting curve.
  kv_cache_backend_info: >
    Get KV-Cache backend information and statistics.
  board_read: >
    Read the complete project board state including active work, file ownership, and recent decisions.
  board_update_summary: >
    Update the project summary in the board.
  board_add_decision: >
    Record a decision made during this project.
  board_claim_file: >
    Claim file ownership to prevent conflicts in multi-agent environments.
  board_release_file: >
    Release all files claimed by this agent.
  board_set_active_work: >
    Set the current active work task for this agent.
  ledger_list: >
    List ledger entries for a project.
  ledger_read: >
    Read a specific ledger entry by ID.
  subscribe: >
    Create an event subscription, register a Webhook URL to receive AgentSoul event pushes.
    When specific events occur, AgentSoul will send an HTTP POST request to the registered URL.
  unsubscribe: >
    Cancel an event subscription, remove a previously registered Webhook push.
  list_subscriptions: >
    List all currently active subscriptions, view subscription IDs and configuration information.
  get_learning_preferences: >
    Get the current learned user preference configuration.
    The adaptive learning system automatically learns user preferences based on feedback.
  submit_feedback: >
    Submit user feedback for adaptive learning.
    Adjust the learning model and PAD emotional state based on user feedback.
  reset_learning: >
    Reset all adaptive learning data to default values.
    Clears all collected interaction data and learned preferences.
  set_learning_intensity: >
    Set the adaptive learning intensity (0 to 1).
    Higher intensity means faster learning but also larger fluctuations.
  get_interaction_statistics: >
    Get collected interaction statistics.
    Includes total interaction count and distribution of feedback types.
  get_health_history: >
    Get project iteration health history records.
    Returns health score, pass rate, mode, and change description for each iteration, useful for trend analysis and visualization.
  board_add_labels: >
    Add custom labels to the project for categorization.
    Supports batch adding multiple labels to help organize project decisions by topic.
  board_remove_labels: >
    Remove custom labels from the project.
    Supports batch removing labels that are no longer needed.
  board_list_labels: >
    List all custom labels defined for the project.
    Returns the array of labels and total count.
  board_search_decisions: >
    Search project decisions by custom labels.
    Returns all decisions that match any of the requested labels.

# Category descriptions for tool index
categories:
  soul: "Personality and emotional state management"
  memory: "Hierarchical time-based and topic-based memory system"
  core_memory: "Persistent core facts storage (auto-injected at boot)"
  entity_memory: "Structured entity tracking (people, projects, hardware, concepts, places, services)"
  kv_cache: "3-tier KV-Cache with Ebbinghaus forgetting curve (session snapshots)"
  soul_board: "Project state management and multi-agent safety (Soul Board & Ledger)"
  subscription: "Event subscription push (Webhook)"
  adaptive: "Adaptive learning and user preference learning"

# Full tool index entries (detailed tool metadata)
tool_index:
  get_persona_config:
    description: "Get the current persona configuration (agent identity and user profile)"
    parameters: "None"
    whenToUse: "Call this at conversation startup to know who you are and who the user is"
