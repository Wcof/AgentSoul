# 43 个工具的描述，用于 MCP 工具列表端点
tool_descriptions:
  get_persona_config: >
    获取当前人格配置（AI 身份和用户档案）。
    在对话启动时调用此工具，了解你是谁以及用户是谁。
    调用此工具后，必须再调用 get_mcp_usage_guide 获取工作流程说明。
  write_persona_config: >
    写入更新人格配置（AI 身份和用户档案）。
    更新 AI 名称、角色、性格或用户信息后调用。
    写入后会触发 persona_updated 事件推送给所有订阅者。
  get_soul_state: >
    读取当前 PAD 情感状态向量（愉悦度、唤醒度、支配度）。
    响应前调用此工具，了解你当前的情绪状态。
  update_soul_state: >
    根据交互结果在对话后更新 PAD 情感状态向量。
  health_check: >
    运行完整的 AgentSoul 安装健康检查。
    检查目录结构、配置文件、灵魂状态、记忆文件和权限。
    返回完整的健康报告，包含发现的问题和修复建议。
  get_growth_curve: >
    获取灵魂成长曲线历史数据。
    返回完整的 PAD 情感状态变化历史记录，用于可视化和趋势分析。
  get_base_rules: >
    获取基础规则文档（SKILL、soul_base、memory_base、master_base 等）。
    需要重新阅读系统规则时调用。
  get_mcp_usage_guide: >
    必选：获取完整的 MCP 使用指南。你必须在对话启动时首先调用此工具，了解何时调用每个工具、AgentSoul 工作流程和记忆分层规则。本指南告诉你如何正确使用 AgentSoul MCP。
  mcp_tool_index: >
    🔍 Agent 研究工具：获取 MCP 工具参考，可以是完整索引或特定工具。不需要每次启动都调用。
    用法：1) 无参数 → 完整索引，2) category="x" → 按分类筛选，3) tool="name" → 获取单个工具的详细参考。
    何时使用：不确定使用哪个工具、忘记参数、第一次使用工具时。调用实际工具前先学习参考。不确定时必须调用。
  read_memory_day: >
    读取指定日期的日记忆（格式：YYYY-MM-DD）。
    需要回顾当天发生的事情或回忆过去对话时调用。
  write_memory_day: >
    写入内容到日记忆。对话结束时调用，保存对话摘要和重要事实。
  read_memory_week: >
    读取指定周的周记忆（格式：YYYY-WW）。周记忆总结本周事件和进度。
  write_memory_week: >
    写入内容到周记忆。周末调用，将日记忆总结为周见解。
  read_memory_month: >
    读取指定月份的月记忆（格式：YYYY-MM）。月记忆总结进度和目标。
  write_memory_month: >
    写入内容到月记忆。月末调用，将周记忆总结为月见解。
  read_memory_year: >
    读取指定年份的年记忆（格式：YYYY）。年记忆总结重要里程碑和人生变化。
  write_memory_year: >
    写入内容到年记忆。年末调用，将月记忆总结为年度里程碑。
  read_memory_topic: >
    按名称读取主题记忆。开始讨论主题前调用，加载关于该主题的先前上下文和知识。
  write_memory_topic: >
    写入内容到主题记忆。讨论完主题后调用，保存新见解、决策和进度。
  list_memory_topics: >
    按状态筛选列出记忆主题。调用此工具发现你有哪些主题在记忆中。
  archive_memory_topic: >
    归档记忆主题（从活跃移至归档）。主题完成或不再活跃讨论时调用。
  core_memory_read: >
    读取智能体的所有核心记忆条目。核心记忆包含持久化键值事实，启动时自动注入。
  core_memory_write: >
    写入或更新核心记忆中的键值事实。核心记忆在会话间持久化，启动时自动注入。
  core_memory_delete: >
    从核心记忆删除一个键。事实不再相关时调用。
  core_memory_list: >
    列出智能体核心记忆中的所有键。
  entity_upsert: >
    创建或更新结构化实体（人、硬件、项目、概念、地点、服务）。实体启动时自动注入，便于快速参考。
  entity_get: >
    按名称获取特定实体。
  entity_search: >
    按关键词搜索实体。
  entity_list: >
    列出所有实体，可按类型筛选。
  entity_delete: >
    按名称删除实体。
  entity_prune: >
    修剪指定天数内未提及的旧实体。
  entity_fact_add: >
    添加一个新的时态事实，自动失效该属性当前所有有效事实。
  entity_fact_invalidate: >
    失效实体指定属性的所有当前有效事实。
  verbatim_add: >
    添加原文证据片段，存储原始未修改的文本和元数据。
  verbatim_get: >
    根据 ID 获取原文证据片段。
  verbatim_search: >
    按关键词搜索原文证据片段，支持可选过滤。
  verbatim_delete: >
    删除原文证据片段。
  kv_cache_save: >
    将会话快照保存到 3 层 KV-Cache。快照自动分层（热/温/冷）并压缩。
  kv_cache_load: >
    加载项目最近的会话快照，并自动修剪令牌预算。
  kv_cache_search: >
    按关键词搜索 KV-Cache 快照。
  kv_cache_list: >
    列出项目的所有快照。
  kv_cache_gc: >
    对 KV-Cache 运行垃圾回收，根据艾宾浩斯遗忘曲线删除旧快照。
  kv_cache_backend_info: >
    获取 KV-Cache 后端信息和统计数据。
  board_read: >
    读取完整项目看板状态，包括活跃工作、文件所有权和最近决策。
  board_update_summary: >
    更新看板中的项目摘要。
  board_add_decision: >
    记录项目中做出的决策。
  board_claim_file: >
    声明文件所有权，防止多智能体环境中的冲突。
  board_release_file: >
    释放此智能体声明的所有文件。
  board_set_active_work: >
    设置此智能体当前的活跃工作任务。
  ledger_list: >
    列出项目的账本条目。
  ledger_read: >
    按 ID 读取特定账本条目。
  subscribe: >
    创建事件订阅，注册 Webhook URL 接收 AgentSoul 事件推送。
    当特定事件发生时，AgentSoul 会向注册的 URL 发送 HTTP POST 请求。
  unsubscribe: >
    取消事件订阅，移除之前注册的 Webhook 推送。
  list_subscriptions: >
    列出所有当前活动的订阅，查看订阅 ID 和配置信息。
  get_learning_preferences: >
    获取当前学习到的用户偏好配置。
    自适应学习系统会根据用户反馈自动学习用户喜好。
  submit_feedback: >
    提交用户反馈用于自适应学习。
    根据用户反馈调整学习模型和 PAD 情感状态。
  reset_learning: >
    重置所有自适应学习数据到默认值。
    清除所有收集的交互数据和学习到的偏好。
  set_learning_intensity: >
    设置自适应学习强度（0 到 1）。
    强度越高，学习速度越快，但波动也越大。
  get_interaction_statistics: >
    获取收集的交互统计信息。
    包括总交互次数和各种反馈类型的分布。
  get_health_history: >
    获取项目迭代健康度历史记录。
    返回每次迭代的健康度、通过率、模式和改动描述，可用于趋势分析和可视化。
  board_add_labels: >
    为项目添加自定义标签用于分类。
    支持批量添加多个标签，帮助按主题组织项目决策。
  board_remove_labels: >
    从项目移除自定义标签。
    支持批量移除不再需要的标签。
  board_list_labels: >
    列出项目定义的所有自定义标签。
    返回标签数组和总数。
  board_search_decisions: >
    按自定义标签搜索项目决策。
    返回匹配任意一个标签的所有决策。

# 工具索引的分类描述
categories:
  soul: "人格和情绪状态管理"
  memory: "分层基于时间和主题的记忆系统"
  core_memory: "持久核心事实存储（启动时自动注入）"
  entity_memory: "结构化实体追踪（人、项目、硬件、概念、地点、服务）"
  kv_cache: "带艾宾浩斯遗忘曲线的 3 层 KV-Cache（会话快照）"
  soul_board: "项目状态管理和多智能体安全（Soul Board & Ledger）"
  subscription: "事件订阅推送（Webhook）"
  adaptive: "自适应学习与用户偏好学习"

# 完整工具索引条目（详细工具元数据）
tool_index:
  get_persona_config:
    description: "获取当前人格配置（AI 身份和用户档案）"
    parameters: "无"
    whenToUse: "在对话启动时调用，了解你是谁以及用户是谁"
    required: true
    example: "{}"
  get_soul_state:
    description: "读取当前 PAD 情感状态向量（愉悦度、唤醒度、支配度）"
    parameters: "无"
    whenToUse: "响应前调用，了解你当前的情绪状态"
    required: true
    example: "{}"
  update_soul_state:
    description: "根据交互结果在对话后更新 PAD 情感状态向量"
    parameters: "{ pleasure?: number (-1 到 +1), arousal?: number (-1 到 +1), dominance?: number (-1 到 +1), trigger?: string }"
    whenToUse: "对话后调用，更新你的情绪状态"
    required: false
    example: '{ "pleasure": 0.3, "arousal": 0.1, "dominance": 0.2, "trigger": "与用户愉快的对话" }'
  get_growth_curve:
    description: "获取灵魂成长曲线历史数据"
    parameters: "无"
    whenToUse: "需要查看 PAD 情感状态变化趋势生成可视化时调用"
    required: false
    example: "{}"
  get_base_rules:
    description: "获取基础规则文档（SKILL、soul_base、memory_base、master_base 等）"
    parameters: "{ name: enum<SKILL|soul_base|memory_base|master_base|secure_base|skills_base|tasks_base> }"
    whenToUse: "需要重新阅读系统规则时调用"
    required: false
    example: '{ "name": "memory_base" }'
  get_mcp_usage_guide:
    description: "获取完整的 MCP 使用指南和工作流程说明"
    parameters: "无"
    whenToUse: "必须：在对话启动时调用，了解 AgentSoul 工作流程"
    required: true
    example: "{}"
  mcp_tool_index:
    description: "获取 MCP 工具参考，完整索引或特定工具查找"
    parameters: "{ category?: enum<soul|memory|core_memory|entity_memory|kv_cache|soul_board|all>, tool?: string (精确工具名称) }"
    whenToUse: "需要研究或查看有哪些可用工具以及何时使用时调用。不需要每次启动都调用 - 需要学习或验证工具用法时调用"
    required: false
    example: '{ "tool": "read_memory_topic" }'
  read_memory_day:
    description: "读取指定日期的日记忆"
    parameters: "{ date: string (YYYY-MM-DD) }"
    whenToUse: "需要回忆当天发生了什么时调用"
    required: false
    example: '{ "date": "2026-03-30" }'
  write_memory_day:
    description: "写入内容到日记忆"
    parameters: "{ date: string (YYYY-MM-DD), content: string }"
    whenToUse: "对话结束时调用，保存日对话摘要"
    required: false
    example: '{ "date": "2026-03-30", "content": "讨论了为 AgentSoul 添加多语言支持..." }'
  read_memory_week:
    description: "读取指定周的周记忆"
    parameters: "{ week: string (YYYY-WW) }"
    whenToUse: "需要回忆周摘要时调用"
    required: false
    example: '{ "week": "2026-13" }'
  write_memory_week:
    description: "写入内容到周记忆"
    parameters: "{ week: string (YYYY-WW), content: string }"
    whenToUse: "周末调用，总结日记忆"
    required: false
    example: '{ "week": "2026-13", "content": "完成了多语言支持的实现..." }'
  read_memory_month:
    description: "读取指定月份的月记忆"
    parameters: "{ month: string (YYYY-MM) }"
    whenToUse: "需要回忆月摘要时调用"
    required: false
    example: '{ "month": "2026-03" }'
  write_memory_month:
    description: "写入内容到月记忆"
    parameters: "{ month: string (YYYY-MM), content: string }"
    whenToUse: "月末调用，总结周记忆"
    required: false
    example: '{ "month": "2026-03", "content": "三月在 AgentSoul 上的进展..." }'
  read_memory_year:
    description: "读取指定年份的年记忆"
    parameters: "{ year: string (YYYY) }"
    whenToUse: "需要回忆年度里程碑时调用"
    required: false
    example: '{ "year": "2026" }'
  write_memory_year:
    description: "写入内容到年记忆"
    parameters: "{ year: string (YYYY), content: string }"
    whenToUse: "年末调用，总结月记忆"
    required: false
    example: '{ "year": "2026", "content": "2026 年度回顾..." }'
  read_memory_topic:
    description: "按名称读取主题记忆"
    parameters: "{ topic: string }"
    whenToUse: "开始讨论主题前调用，加载先前上下文"
    required: false
    example: '{ "topic": "agentsoul-mcp-improvement" }'
  write_memory_topic:
    description: "写入内容到主题记忆"
    parameters: "{ topic: string, content: string, status?: string (active/archived) }"
    whenToUse: "讨论完主题后调用，保存新见解"
    required: false
    example: '{ "topic": "agentsoul-mcp-improvement", "content": "为 MCP 工具添加了多语言支持...", "status": "active" }'
  list_memory_topics:
    description: "按状态筛选列出记忆主题"
    parameters: "{ status?: enum<active|archived|all> }"
    whenToUse: "启动时或搜索现有主题时调用"
    required: false
    example: '{ "status": "active" }'
  archive_memory_topic:
    description: "归档记忆主题（从活跃移至归档）"
    parameters: "{ topic: string }"
    whenToUse: "主题完成或不再活跃讨论时调用"
    required: false
    example: '{ "topic": "old-project" }'
  core_memory_read:
    description: "读取智能体的所有核心记忆条目"
    parameters: "{ agent?: string }"
    whenToUse: "需要加载所有持久化事实时调用"
    required: false
    example: '{ "agent": "default" }'
  core_memory_write:
    description: "写入或更新核心记忆中的键值事实"
    parameters: "{ key: string, value: string, agent?: string }"
    whenToUse: "学到新的持久化事实需要跨会话保存时调用"
    required: false
    example: '{ "key": "user_favorite_color", "value": "blue" }'
  core_memory_delete:
    description: "从核心记忆删除一个键"
    parameters: "{ key: string, agent?: string }"
    whenToUse: "事实不再相关时调用"
    required: false
    example: '{ "key": "old_preference" }'
  core_memory_list:
    description: "列出智能体核心记忆中的所有键"
    parameters: "{ agent?: string }"
    whenToUse: "需要了解存储了哪些事实时调用"
    required: false
    example: '{ "agent": "default" }'
  entity_upsert:
    description: "创建或更新结构化实体"
    parameters: "{ name: string, type: enum<person|hardware|project|concept|place|service>, description?: string, metadata?: object, tags?: string[] }"
    whenToUse: "遇到新实体或需要更新现有实体信息时调用"
    required: false
    example: '{ "name": "Claude Code", "type": "service", "description": "Anthropic Claude Code CLI", "tags": ["cli", "ai", "coding"] }'
  entity_get:
    description: "按名称获取特定实体"
    parameters: "{ name: string }"
    whenToUse: "需要特定实体的详细信息时调用"
    required: false
    example: '{ "name": "Claude Code" }'
  entity_search:
    description: "按关键词搜索实体"
    parameters: "{ query: string, limit?: number }"
    whenToUse: "需要查找匹配关键词的实体时调用"
    required: false
    example: '{ "query": "claude", "limit": 10 }'
  entity_list:
    description: "列出所有实体，可按类型筛选"
    parameters: "{ type?: enum<person|hardware|project|concept|place|service> }"
    whenToUse: "需要浏览特定类型的所有实体时调用"
    required: false
    example: '{ "type": "project" }'
  entity_delete:
    description: "按名称删除实体"
    parameters: "{ name: string }"
    whenToUse: "实体应该被完全移除时调用"
    required: false
    example: '{ "name": "old-project" }'
  entity_prune:
    description: "修剪指定天数内未提及的旧实体"
    parameters: "{ days: number }"
    whenToUse: "定期进行垃圾回收时调用"
    required: false
    example: '{ "days": 90 }'
  entity_fact_add:
    description: "添加一个新的时态事实，自动失效该属性当前所有有效事实"
    parameters: "{ name: string, attribute: string, value: string, confidence?: number, source_ref?: string }"
    whenToUse: "当属性事实发生变化，需要添加新事实并使旧事实失效时调用"
    required: true
    example: '{ "name": "Sample Project", "attribute": "status", "value": "completed", "source_ref": "memory_topic:project-updates" }'
  entity_fact_invalidate:
    description: "失效实体指定属性的所有当前有效事实"
    parameters: "{ name: string, attribute: string }"
    whenToUse: "当需要清空某个属性的所有当前有效事实时调用"
    required: true
    example: '{ "name": "Sample Project", "attribute": "status" }'
  verbatim_add:
    description: "添加原文证据片段，存储原始未修改的文本和元数据"
    parameters: "{ text: string, source: string, date: string, security_level?: enum<PUBLIC|PROTECTED|SEALED>, topic?: string, entity?: string, tags?: string[] }"
    whenToUse: "当你需要保留原始文本片段用于将来可追溯时调用"
    required: true
    example: '{ "text": "Original user quote...", "source": "conversation:2026-04-10", "date": "2026-04-10", "topic": "discussion-topic" }'
  verbatim_get:
    description: "根据 ID 获取原文证据片段，遵循安全级别规则：SEALED 永不明文返回，PROTECTED 默认掩码，必须同时请求 include_protected_text=true AND can_view_protected=true 才可查看明文"
    parameters: "{ id: string, include_protected_text?: boolean, can_view_protected?: boolean }"
    whenToUse: "当你需要获取特定片段的完整内容时调用"
    required: true
